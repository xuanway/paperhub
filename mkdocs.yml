site_name: 可信高效计算论文
site_description: "MICRO·ISCA·HPCA·ASPLOS·DAC·NeurIPS·ICML 顶会论文解读 | 聚焦可信高效计算 | 2025/2026年"
site_url: https://xuanway.github.io/paperhub/
repo_url: https://github.com/xuanway/paperhub
repo_name: GitHub
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  custom_dir: overrides
  favicon: assets/favicon.svg
  icon:
    logo: material/book-open-variant
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.prune
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: deep purple
      toggle:
        icon: custom/sun
        name: Switch to Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: deep purple
      toggle:
        icon: custom/moon
        name: Switch to Light Mode
  font:
    text: Noto Sans SC
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/javascripts/wordcloud2.js
  - assets/javascripts/custom.js

plugins:
  - search:
      lang: zh
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - footnotes

